global:
  scrape_interval: 15s
  evaluation_interval: 15s # how oftend alerts are evaluated

rule_files:
  - "alerting_rules.yaml"
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"] # default Alertmanager port

scrape_configs:
  - job_name: "job-processor"
    static_configs:
      - targets: ["app:8000"]

  - job_name: "job-worker"
    static_configs:
      - targets: ["worker:8001"]
