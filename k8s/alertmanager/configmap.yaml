apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: sre-job-processor
data:
  alertmanager.yml: |
    global:
      slack_api_url: "${SLACK_WEBHOOK_URL}"
      resolve_timeout: 5m

    route:
      receiver: "slack-notifications"
      group_by: ["alertname"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 1h

      routes:
        - match:
            severity: critical
          receiver: "slack-critical"
          repeat_interval: 30m

        - match:
            severity: warning
          receiver: "slack-warnings"
          repeat_interval: 1h

    receivers:
      - name: "slack-notifications"
        slack_configs:
          - channel: "#alerts"
            send_resolved: true
            title: "{{ .GroupLabels.alertname }}"
            text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"

      - name: "slack-critical"
        slack_configs:
          - channel: "#alerts"
            send_resolved: true
            color: "danger"
            title: "🔴 CRITICAL: {{ .GroupLabels.alertname }}"
            text: |
              {{ range .Alerts }}
              {{ .Annotations.description }}
              📖 Runbook: {{ .Annotations.runbook }}
              {{ end }}

      - name: "slack-warnings"
        slack_configs:
          - channel: "#alerts"
            send_resolved: true
            color: "warning"
            title: "⚠️ WARNING: {{ .GroupLabels.alertname }}"
            text: |
              {{ range .Alerts }}
              {{ .Annotations.description }}
              📖 Runbook: {{ .Annotations.runbook }}
              {{ end }}
