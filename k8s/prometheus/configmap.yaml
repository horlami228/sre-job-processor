apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: sre-job-processor
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - "/etc/prometheus/alerting_rules.yml"

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager:9093"]

    scrape_configs:
      - job_name: "job-processor"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - sre-job-processor
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: job-processor-app
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:8000

      - job_name: "job-worker"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - sre-job-processor
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: job-processor-worker
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:8001
