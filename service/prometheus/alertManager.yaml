global:
  slack_api_url: "https://hooks.slack.com/services/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"
  resolve_timeout: 5m # how long to wait before sending a resolved notification

route:
  receiver: "slack-notifications" # default receiver for all alerts
  group_by: ["alertname"] # group alerts with the same name together
  group_wait: 30s # wait 30s before sending first notification (in case more alerts fire)
  group_interval: 5m # wait 5m before sending updates on the same group
  repeat_interval: 1h # resend if still firing after 1 hour

  # Route critical alerts separately from warnings
  routes:
    - match:
        severity: critical
      receiver: "slack-critical"
      repeat_interval: 30m # critical alerts repeat every 30 mins if still firing

    - match:
        severity: warning
      receiver: "slack-warnings"
      repeat_interval: 1h

receivers:
  - name: "slack-notifications"
    slack_configs:
      - channel: "#alerts"
        send_resolved: true
        title: "{{ .GroupLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"

  - name: "slack-critical"
    slack_configs:
      - channel: "#alerts"
        send_resolved: true
        color: "danger"
        title: "🔴 CRITICAL: {{ .GroupLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"

  - name: "slack-warnings"
    slack_configs:
      - channel: "#alerts"
        send_resolved: true
        color: "warning"
        title: "⚠️ WARNING: {{ .GroupLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"
